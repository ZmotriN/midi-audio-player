<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/png" href="https://zmotrin.github.io/midi-audio-player/images/favicon.png">
	<!-- <link rel="stylesheet" href="https://zmotrin.github.io/midi-audio-player/styles/styles.css"> -->
	<!-- <script src="https://cdn.jsdelivr.net/npm/midi-audio-player@1.1.2/dist/midi-audio-player.min.js"></script> -->
	<link rel="stylesheet" href="../../styles/styles.css">
	<script src="/dist/midi-audio-player.js"></script>
	<title>MediaAudioPlayer | Example 1</title>
</head>
<body>
	<main>
		<section>
			<div class="controls">
				<div class="btn play"></div>
				<div class="btn pause"></div>
				<div class="btn stop active"></div>
			</div>
			<pre class="logs"></pre>


			<div class="meter">
				<svg viewBox="0 0 40 400">
					<rect class="meter__background" width="40" height="400" rx="2"/>
					<rect class="meter__inner" width="28" height="380" x="6" y="10" rx="1"/>
					<g class="meter__bands">
						<rect class="meter__band" width="24" height="4" x="8" y="20" fill="#f33" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="30" fill="#f33" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="40" fill="#f33" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="55" fill="gold" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="65" fill="gold" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="75" fill="gold" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="85" fill="gold" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="100" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="110" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="120" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="130" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="140" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="150" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="160" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="170" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="180" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="190" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="200" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="210" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="220" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="230" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="240" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="250" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="260" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="270" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="280" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="290" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="300" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="310" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="320" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="330" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="340" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="350" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="360" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="370" fill="#3f3" rx="1"/>
						<rect class="meter__band" width="24" height="4" x="8" y="380" fill="#3f3" rx="1"/>
					</g>
				</svg>
			</div>
			<div class="dbvol">
				<input type="range" class="dbvol__input" min="0" max="100" vertical>
				<svg viewBox="0 0 40 400" class="dbvol__svg" style="--y: 180px;">
					<rect class="dbvol__background" width="40" height="400" rx="4" fill="#1a1a1a" />
					<rect class="dbvol__inner" width="4" height="360" x="18" y="20" rx="2" fill="#000" stroke="#333" />
					<g class="dbvol__slider">
						<rect width="30" height="15" x="5" fill="#333" rx="2" />
						<path fill="#444" d="M5 2h30v11H5z" />
						<path fill="#00FF00" d="M5 7h30v1H5z" />
						<path fill-opacity=".3" d="M5 15h30v3H5z" />
					</g>
					<path stroke="#444" d="M32 20h4m-4 180h4m-4 180h4" />
				</svg>
			</div>
		</section>
	</main>
	<script src="./script.js"></script>
</body>
</html>
